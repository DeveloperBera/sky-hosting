services:
  # Sky-Hosting API Server
  - type: web
    name: sky-hosting-api
    env: node
    region: oregon
    plan: standard
    buildCommand: "pnpm install && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/api-server run build"
    startCommand: "node --enable-source-maps artifacts/api-server/dist/index.mjs"
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false   # set this in the Render dashboard — use the PUBLIC Railway URL (crossover.proxy.rlwy.net:...)
      - key: JWT_SECRET
        generateValue: true
      - key: BASE_DOMAIN
        sync: false   # set to your Render app URL e.g. sky-hosting-api.onrender.com
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DEPLOY_DIR
        value: /var/data/sky-hosting-apps
    disk:
      name: deploy-storage
      mountPath: /var/data
      sizeGB: 10

  # Sky-Hosting Admin Dashboard (static)
  - type: web
    name: sky-hosting-dashboard
    env: static
    region: oregon
    plan: free
    buildCommand: "pnpm install && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/admin-dashboard run build"
    staticPublishPath: artifacts/admin-dashboard/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
