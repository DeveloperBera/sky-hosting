version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sky_hosting
      POSTGRES_USER: sky_hosting
      POSTGRES_PASSWORD: sky_hosting_secret
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sky_hosting"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://sky_hosting:sky_hosting_secret@db:5432/sky_hosting
      PORT: 8080
      NODE_ENV: production
      JWT_SECRET: change-this-in-production-use-a-long-random-string
      BASE_DOMAIN: localhost:8080
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"
    volumes:
      - apps-data:/root/sky-hosting-apps
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    image: nginx:alpine
    volumes:
      - ./artifacts/admin-dashboard/dist/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db-data:
  apps-data:
