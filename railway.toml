[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30

